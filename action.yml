name: DevDoctor CI Diagnostics
description: Read-only multi-stack diagnostics for CI environments.

branding:
  icon: activity
  color: blue

inputs:
  version:
    description: Explicit DevDoctor release tag to download, for example v1.45.0. Latest is never used implicitly.
    required: true
  modules:
    description: Comma-separated DevDoctor modules to run in CI.
    required: false
    default: env,php,node,laravel,composer,git,docker
  format:
    description: "Output format: table, json, or sarif."
    required: false
    default: table
  path:
    description: Repository-relative project path to inspect.
    required: false
    default: .
  extra-args:
    description: Additional arguments passed to devdoctor ci, such as --profile=strict-ci.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.5"
        coverage: none

    - name: Download, verify, and run DevDoctor
      shell: pwsh
      run: >-
        & "${{ github.action_path }}/.github/scripts/run-devdoctor.ps1"
        -Version "${{ inputs.version }}"
        -Modules "${{ inputs.modules }}"
        -Format "${{ inputs.format }}"
        -Path "${{ inputs.path }}"
        -ExtraArgs "${{ inputs.extra-args }}"
