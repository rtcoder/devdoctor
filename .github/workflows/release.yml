name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: fileinfo

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify tag version
        shell: bash
        run: |
          version="$(php -r '$data=json_decode(file_get_contents("composer.json"), true); echo $data["extra"]["devdoctor"]["version"];')"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Validate release
        run: |
          composer validate --strict --no-check-publish
          php devdoctor test
          php vendor/bin/pint --test

      - name: Build PHAR
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          php devdoctor app:build devdoctor --build-version="${version}" --no-interaction
          mv builds/devdoctor devdoctor.phar
          php devdoctor.phar --version
          sha256sum devdoctor.phar > devdoctor.phar.sha256

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign PHAR
        run: |
          cosign sign-blob --yes \
            --output-signature devdoctor.phar.sig \
            --output-certificate devdoctor.phar.pem \
            devdoctor.phar

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            devdoctor.phar \
            devdoctor.phar.sha256 \
            devdoctor.phar.sig \
            devdoctor.phar.pem

      - name: Update Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          sha256="$(cut -d ' ' -f 1 devdoctor.phar.sha256)"
          bash .github/scripts/update-homebrew-tap.sh "${version}" "${sha256}"
