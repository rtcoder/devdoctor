name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: fileinfo

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify tag version
        shell: bash
        run: |
          version="$(php -r '$data=json_decode(file_get_contents("composer.json"), true); echo $data["extra"]["devdoctor"]["version"];')"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Validate release
        run: |
          composer validate --strict --no-check-publish
          php devdoctor test
          php vendor/bin/pint --test

      - name: Build PHAR
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          php devdoctor app:build devdoctor.phar --build-version="${version}" --no-interaction
          mkdir -p release
          mv builds/devdoctor.phar release/devdoctor.phar
          php release/devdoctor.phar --version
          (cd release && sha256sum devdoctor.phar > devdoctor.phar.sha256)

      - name: Build standalone binaries
        shell: bash
        run: |
          ./vendor/bin/phpacker build --src=./release/devdoctor.phar --dest=./builds/standalone --php=8.5 all

          cp builds/standalone/linux/linux-x64 release/devdoctor-linux-x64
          cp builds/standalone/linux/linux-arm release/devdoctor-linux-arm64
          cp builds/standalone/mac/mac-x64 release/devdoctor-macos-x64
          cp builds/standalone/mac/mac-arm release/devdoctor-macos-arm64
          cp builds/standalone/windows/windows-x64.exe release/devdoctor-windows-x64.exe

          chmod +x release/devdoctor-linux-x64 release/devdoctor-linux-arm64 release/devdoctor-macos-x64 release/devdoctor-macos-arm64
          release/devdoctor-linux-x64 --version
          (cd release && sha256sum devdoctor.phar devdoctor-linux-x64 devdoctor-linux-arm64 devdoctor-macos-x64 devdoctor-macos-arm64 devdoctor-windows-x64.exe > devdoctor.sha256)

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release executables
        shell: bash
        run: |
          for asset in release/devdoctor.phar release/devdoctor-linux-x64 release/devdoctor-linux-arm64 release/devdoctor-macos-x64 release/devdoctor-macos-arm64 release/devdoctor-windows-x64.exe; do
            cosign sign-blob --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem" \
              "${asset}"
          done

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            release/*

      - name: Update Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash .github/scripts/update-homebrew-tap.sh "${version}" "release/devdoctor.sha256"
