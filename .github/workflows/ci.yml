name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: PHP 8.5 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2022

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: fileinfo

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate Composer
        run: composer validate --strict --no-check-publish

      - name: Run tests
        run: php devdoctor test

      - name: Check formatting
        run: php vendor/bin/pint --test

  phar:
    name: Build PHAR
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: fileinfo

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build executable
        shell: bash
        run: |
          version="$(php -r '$data=json_decode(file_get_contents("composer.json"), true); echo $data["extra"]["devdoctor"]["version"];')"
          php devdoctor app:build devdoctor.phar --build-version="${version}" --no-interaction

      - name: Test PHAR
        run: php builds/devdoctor.phar --version

      - name: Build standalone Linux binary
        shell: bash
        run: ./vendor/bin/phpacker build --src=./builds/devdoctor.phar --dest=./builds/standalone --php=8.5 linux x64

      - name: Test standalone Linux binary
        run: ./builds/standalone/linux/linux-x64 --version
